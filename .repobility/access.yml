# Repobility access matrix — SecureChat
# https://repobility.com/docs/access-matrix
#
# Authorization model: identity = X25519 keypair held by the client.
# The relay never holds private keys, so it cannot grant or revoke a role.
# Each Socket.IO event below is stamped with the registered pubkey of the
# sending socket; client-supplied "from" fields are ignored.

version: 1

roles:
  anonymous:
    description: Connected socket that has not yet sent a register event.
  identified:
    description: Connected socket bound to a 32-byte X25519 public key via register.
  recipient:
    description: Holder of the secret key matching a recipient pubkey on a message envelope.

endpoints:
  - method: GET
    path: /
    role: anonymous
    description: Static SPA shell.
    protection: none

  - method: GET
    path: /healthz
    role: anonymous
    description: Liveness probe.
    protection: none

  - method: GET
    path: /vendor/nacl/nacl.min.js
    role: anonymous
    description: Pinned TweetNaCl library.
    protection: none

  - method: GET
    path: /vendor/nacl/nacl-util.min.js
    role: anonymous
    description: Pinned TweetNaCl util library.
    protection: none

  - method: GET
    path: /socket.io/*
    role: anonymous
    description: Socket.IO transport handshake. Per-event auth follows.
    protection: none

  - method: GET
    path: /robots.txt
    role: anonymous
    description: Crawl policy.
    protection: none

  - method: GET
    path: /sitemap.xml
    role: anonymous
    description: Sitemap.
    protection: none

  - method: GET
    path: /humans.txt
    role: anonymous
    description: Project credits.
    protection: none

  - method: GET
    path: /llms.txt
    role: anonymous
    description: Machine-readable project summary for AI agents.
    protection: none

  - method: GET
    path: /.well-known/security.txt
    role: anonymous
    description: RFC 9116 security contact.
    protection: none

  - method: WS
    path: register
    role: anonymous
    description: Claim an X25519 identity for this socket.
    protection: regex_validate_pubkey

  - method: WS
    path: presence:check
    role: identified
    description: Query whether a pubkey has any live socket.
    protection: regex_validate_pubkey

  - method: WS
    path: message
    role: identified
    description: Submit an encrypted envelope for relay to a recipient pubkey.
    protection: server_stamps_from_identity, regex_validate_payload, recipient_routed_only
    asserted_by: tests/auth.test.js

  - method: WS
    path: typing
    role: identified
    description: Forward a typing indicator to a single recipient.
    protection: server_stamps_from_identity, regex_validate_pubkey

non_goals:
  - No server-side accounts, sessions, or password authentication.
  - No admin or super_admin role exists. The relay has no privileged operations a client could be granted.
  - No persistent message storage. The offline queue is a bounded in-memory buffer drained on register.
  - No federation. Each relay is its own identity namespace.

asserted_by:
  - tests/auth.test.js
  - tests/server.test.js

cwe_references:
  - CWE-285
  - CWE-287
  - CWE-345
  - CWE-359

owasp_references:
  - A01:2021
  - A02:2021
  - A04:2021
  - A07:2021
